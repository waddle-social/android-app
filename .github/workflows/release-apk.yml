name: Release APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Create throwaway APK signing key
        run: |
          mkdir -p build/ci
          keytool -genkeypair \
            -keystore build/ci/waddle-ci-release.keystore \
            -storepass android \
            -keypass android \
            -alias waddle-ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Waddle CI,O=Waddle,C=US"

      - name: Compute version info
        id: version
        run: |
          VERSION_CODE=$((${{ github.run_number }} + 1))
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION_SUFFIX="${{ github.run_number }}-${SHORT_SHA}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_SUFFIX=${VERSION_SUFFIX}" >> "$GITHUB_ENV"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_suffix=${VERSION_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_SUFFIX: ${{ env.VERSION_SUFFIX }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: waddle-release-apk-${{ steps.version.outputs.version_suffix }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
