name: Release APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-37 build-tools;37.0.0

      - name: Materialise signing keystore
        id: signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p build/ci
          KEYSTORE_PATH="$(pwd)/build/ci/waddle-ci-release.keystore"
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] \
             && [ -n "$RELEASE_KEYSTORE_PASSWORD" ] \
             && [ -n "$RELEASE_KEY_ALIAS" ] \
             && [ -n "$RELEASE_KEY_PASSWORD" ]; then
            echo "Using real release keystore from secrets."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "SIGNING_MODE=real" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "::add-mask::$RELEASE_KEYSTORE_PASSWORD"
            echo "::add-mask::$RELEASE_KEY_PASSWORD"
          else
            echo "::warning title=Throwaway release signing key::\
RELEASE_KEYSTORE_BASE64 (and friends) not configured — the APK will be signed \
with a fresh throwaway key every build. Installs on top of a previous APK will \
fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE. Set the secrets to use a stable \
signing key."
            if [ ! -s "$KEYSTORE_PATH" ]; then
              keytool -genkeypair \
                -keystore "$KEYSTORE_PATH" \
                -storepass android \
                -keypass android \
                -alias waddle-ci-release \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Waddle CI,O=Waddle,C=US"
            fi
            echo "SIGNING_MODE=throwaway" >> "$GITHUB_ENV"
          fi

      - name: Compute version info
        id: version
        run: |
          VERSION_CODE=$((${{ github.run_number }} + 1))
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION_SUFFIX="${{ github.run_number }}-${SHORT_SHA}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_SUFFIX=${VERSION_SUFFIX}" >> "$GITHUB_ENV"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_suffix=${VERSION_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_SUFFIX: ${{ env.VERSION_SUFFIX }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: waddle-release-apk-${{ steps.version.outputs.version_suffix }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
